name: 📈 Update IDX Stocks Daily

on:
  schedule:
    # 16:00 WIB (09:00 UTC) — after market close
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install yfinance pandas requests
      
      - name: Update stocks
        id: run
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python update_stocks.py
          echo "done=$(cat updated_stocks.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(f\"{d[\"stocks_updated\"]}/{d[\"total_stocks\"]} stocks, {d[\"latest_date\"]}\")')" >> $GITHUB_OUTPUT
      
      - name: Upload DB artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: stocks-db
          path: stocks.db
          retention-days: 3
      
      - name: Commit to repo
        run: |
          git config user.name "Stock Bot"
          git config user.email "bot@stocks.id"
          git add stocks.db updated_stocks.json
          git commit -m "📈 ${{ steps.run.outputs.done }}" || echo "No changes"
          git push
