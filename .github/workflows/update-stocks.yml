name: 📈 Update IDX Stocks Daily

on:
  schedule:
    # 16:00 WIB (09:00 UTC) — after market close
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install yfinance==0.2.44 pandas requests
      
      - name: Update stocks
        run: |
          python update_stocks.py
      
      - name: Upload DB artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: stocks-db
          path: stocks.db
          retention-days: 3
      
      - name: Commit to repo
        run: |
          git config user.name "Stock Bot"
          git config user.email "bot@stocks.id"
          git add -f stocks.db updated_stocks.json
          git diff --cached --quiet || {
            git commit -m "📈 Stock update $(date +'%Y-%m-%d')"
            git push
          }
