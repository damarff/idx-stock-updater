name: "Test Yahoo Access from GitHub"
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: "curl Yahoo"
      run: |
        curl -s -o /tmp/yf1.json -w "HTTP=%{http_code} size=%{size_download}" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          "https://query1.finance.yahoo.com/v8/finance/chart/BBCA.JK?range=5d&interval=1d"
        echo ""

    - name: "yfinance test"
      run: pip install yfinance==0.2.44 -q && python3 -c "import yfinance as yf; d=yf.download(['BBCA.JK'],period='5d',interval='1d',progress=False); print('OK',d['Close'].iloc[-1]) if d is not None and not d.empty else print('FAIL')"

    - name: "CSV endpoint"
      run: |
        curl -s -o /tmp/yf3.csv -w "HTTP=%{http_code} size=%{size_download}" \
          -H "User-Agent: Mozilla/5.0" \
          "https://query1.finance.yahoo.com/v7/finance/download/BBCA.JK?period1=1717000000&period2=1717600000&interval=1d&events=history"
        echo ""
        head -3 /tmp/yf3.csv 2>/dev/null || echo "empty"
